name: Extract Agar Bot Logic
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Analysis Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-multiarch radare2 binutils

      - name: Quick Scan (Strings & Symbols)
        run: |
          mkdir -p results
          # Extract readable text (IPs, URLs, Bot Commands)
          strings binaries/sharkmod.dylib > results/all_strings.txt
          grep -Ei "ws|http|bot|spawn|client|packet|agario|port" results/all_strings.txt > results/filtered_strings.txt
          
          # Get the function names and "demangle" them (make them readable)
          nm -gU binaries/sharkmod.dylib | c++filt > results/readable_functions.txt || true

      - name: Disassemble Logic (The Code)
        run: |
          # This converts the binary into Assembly code which we can read
          objdump -dC binaries/sharkmod.dylib > results/disassembly.txt || true
          
          # Use Radare2 to look for specific bot "offsets"
          r2 -qc "aa; afl" binaries/sharkmod.dylib > results/function_list.txt

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: SharkMod-Analysis
          path: results/
