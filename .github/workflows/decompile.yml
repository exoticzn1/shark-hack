name: Extract Agar Bot Logic
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Analysis Tools
        run: |
          sudo apt-get update
          # Fixed the package name to radare2
          sudo apt-get install -y binutils-multiarch radare2 
          
          # Download RetDec
          wget https://github.com/avast/retdec/releases/download/v5.0/retdec-v5.0-ubuntu-64bit.tar.xz
          tar -xf retdec-v5.0-ubuntu-64bit.tar.xz

      - name: Quick Scan (Strings & Symbols)
        run: |
          mkdir -p results
          # This finds URLs, IPs, and Bot Commands
          strings binaries/sharkmod.dylib | grep -Ei "ws|http|bot|spawn|client|packet|agario" > results/interesting_strings.txt
          # This finds function names
          nm -gU binaries/sharkmod.dylib > results/function_names.txt || true

      - name: Deep Decompile
        run: |
          # The '|| true' ensures the workflow finishes even if the decompiler hits a small error
          ./retdec/bin/retdec-decompiler binaries/sharkmod.dylib --output results/bot_logic.c --cleanup || true

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: SharkMod-Source
          path: results/
