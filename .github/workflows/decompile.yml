name: Decompile SharkMod
on:
  push:
    branches:
      - main  # This makes it run automatically when you upload the dylib
  workflow_dispatch: # Keeps the manual button too


jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Analysis Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-multiarch radix2 
          # Download a faster decompiler for mobile dylibs
          wget https://github.com/avast/retdec/releases/download/v5.0/retdec-v5.0-ubuntu-64bit.tar.xz
          tar -xf retdec-v5.0-ubuntu-64bit.tar.xz

      - name: Scan for Bot Protocols
        run: |
          mkdir -p results
          # Look for WebSocket (ws:// or wss://) and Agar-specific strings
          strings binaries/sharkmod.dylib | grep -E "ws://|wss://|bot|spawn|client" > results/network_strings.txt
          
          # Look for common Agar.io packet headers (often hex values)
          nm -gU binaries/sharkmod.dylib > results/symbols.txt

      - name: Deep Decompile
        run: |
          # Targeting the C++ logic specifically
          ./retdec/bin/retdec-decompiler binaries/sharkmod.dylib --output results/bot_logic.c --cleanup

      - name: Upload Bot Source
        uses: actions/upload-artifact@v4
        with:
          name: SharkMod-Bot-Source
          path: results/
