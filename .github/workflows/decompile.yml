name: Extract Agar Bot Logic
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-multiarch radare2 binutils

      - name: Identify and Extract
        run: |
          mkdir -p results
          # This finds your sharkmod.dylib in the main folder automatically
          TARGET_FILE=$(find . -maxdepth 1 -name "*.dylib" | head -n 1)
          echo "Found file: $TARGET_FILE"
          
          # 1. Get all text (IPs, URLs, Bot Commands)
          strings "$TARGET_FILE" > results/all_strings.txt
          
          # 2. Specifically hunt for Agar.io mobile server/bot info
          grep -Ei "ws|wss|http|bot|spawn|client|packet|agario|port|154.21" results/all_strings.txt > results/filtered_bot_info.txt || true
          
          # 3. Get function names (What the bots actually do)
          nm -gU "$TARGET_FILE" | c++filt > results/functions.txt || true

      - name: Hex Scan for Packets
        run: |
          TARGET_FILE=$(find . -maxdepth 1 -name "*.dylib" | head -n 1)
          # Agar.io packet 16 (Move) and 21 (Split) are key. 
          # This tells Radare2 to list all function names it can find.
          r2 -qc "aa; afl" "$TARGET_FILE" > results/function_list.txt || true

      - name: Save Results to iPad
        uses: actions/upload-artifact@v4
        with:
          name: SharkMod-Bot-Data
          path: results/
