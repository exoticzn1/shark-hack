name: Full Logic & Security Bypass
on: [push, workflow_dispatch]

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Radare2
        run: sudo apt-get update && sudo apt-get install -y radare2

      - name: Deconstruct Dylib
        run: |
          mkdir -p output
          TARGET=$(find . -maxdepth 1 -name "*.dylib" | head -n 1)
          
          # 1. Generate the 'Pseudo-Code' (The closest to 'Full Code' we can get)
          # 'aa' analyzes, 'pD' decompiles the entire text section
          r2 -qc "aa; pD $$(r2 -qc 'i~[2]' $TARGET)" "$TARGET" > output/logic_flow.c || true
          
          # 2. Extract every hidden URL and IP in one clean list
          strings "$TARGET" | grep -Ei "http|https|ws|wss|57\.|154\." > output/endpoints.txt || true
          
          # 3. Find the exact 'Auth' check bypass point
          # This looks for the 'Invalid Key' string and shows the code around it
          r2 -qc "aa; /c invalid; pD 50 @ \` /c invalid \` " "$TARGET" > output/auth_bypass_check.txt || true

          # 4. Map the entire function list (The 'Blueprint')
          r2 -qc "aa; afl" "$TARGET" > output/function_map.txt || true

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: Shark-Full-Source
          path: output/
