name: Full Code Extraction
on: [push, workflow_dispatch]

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Radare2 & Decompiler
# We use a specific ppa to get the decompiler plugin included
        run: |
          sudo add-apt-repository ppa:radare2/ppa -y
          sudo apt-get update
          sudo apt-get install -y radare2
          r2pm init
          r2pm -i r2ghidra

      - name: Decompile Entire Dylib
        run: |
          mkdir -p source_code
          TARGET=$(find . -maxdepth 1 -name "*.dylib" | head -n 1)
          
          # 'pdg' is the command for the Ghidra decompiler inside Radare2
          # We tell it to analyze (aa) then dump the decompiler output
          r2 -qc "aa; pdg" "$TARGET" > source_code/full_decompiled_logic.c || true
          
          # Grab all strings one more time just for reference
          strings "$TARGET" > source_code/all_strings.txt

      - name: Upload Source
        uses: actions/upload-artifact@v4
        with:
          name: SharkMod-Source-Code
          path: source_code/
