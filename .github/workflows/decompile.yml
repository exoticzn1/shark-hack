name: SharkMod Deobfuscate
on: [push]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y radare2 binutils
          pip install r2pipe

      - name: Extract Strings & Symbols
        run: |
          # This pulls all URLs and potential Keys from the binary
          strings sharkmod.dylib | grep -E "http|https|ws|SK-|Bearer" > extracted_secrets.txt
          
      - name: Find Auth Bypass Point
        run: |
          # We search for where the 'Invalid Key' logic lives
          r2 -qc "/c invalid key" sharkmod.dylib > bypass_locations.txt

      - name: Upload Results
        uses: actions/apps/upload-artifact@v4
        with:
          name: Shark-Analysis
          path: |
            extracted_secrets.txt
            bypass_locations.txt
