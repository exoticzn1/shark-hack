name: Full Code Extraction
on: [push, workflow_dispatch]

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ghidra Headless
        run: |
          sudo apt-get update
          sudo apt-get install -y ghidra radare2

      - name: Decompile to C
        run: |
          mkdir -p source_code
          TARGET=$(find . -maxdepth 1 -name "*.dylib" | head -n 1)
          
          # Use Radare2's Ghidra plugin to dump the pseudo-code
          # This will try to recreate the 'main' logic and bot functions
          r2 -qc "aa; pdg" "$TARGET" > source_code/decompiled_logic.c || true
          
          # Also dump the 'Pseudo-C' of the auth functions specifically
          r2 -qc "aa; s sym._handleAuthResponse; pdg" "$TARGET" > source_code/auth_logic.c || true

      - name: Upload Source
        uses: actions/upload-artifact@v4
        with:
          name: SharkMod-Source-Code
          path: source_code/
