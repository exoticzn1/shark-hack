name: SharkMod Force Unlock
on: [push, workflow_dispatch]

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Radare2
        run: sudo apt-get update && sudo apt-get install -y radare2

      - name: Universal Bypass Patch
        run: |
          TARGET=$(find . -maxdepth 1 -name "*.dylib" | head -n 1)
          
          # This command finds 'handleAuthResponse' and 'is_pro'
          # It replaces the first instruction of those functions with 'return 1' (True)
          # mov w0, #1 (0x20008052) | ret (0xc0035fd6)
          r2 -wqc "aa; s sym._handleAuthResponse; wa mov w0, 1; wa ret" "$TARGET" || true
          r2 -wqc "aa; s sym._is_pro; wa mov w0, 1; wa ret" "$TARGET" || true
          
          # This is the "Nuke" patch: it finds every branch (if/else) and makes it stay open
          r2 -wqc "aa; /c cbz w0; s hit0_0; wa nop" "$TARGET" || true

      - name: Upload Patched Mod
        uses: actions/upload-artifact@v4
        with:
          name: SharkMod-Unlocked
          path: "*.dylib"
